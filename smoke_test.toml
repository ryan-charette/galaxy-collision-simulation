[simulation]
name = "smoke_test"
dim = 2
solver = "direct"
seed = 42
n_particles = 1024
steps = 40
dt = 0.01
snapshot_every = 10
tree_theta = 0.6
tree_leaf_capacity = 16

[physics]
G = 1.0
softening = 0.02

[galaxy.primary]
n_particles = 512
mass = 1.0
radius = 1.0
position = [-0.8, 0.0]
velocity = [0.15, 0.0]
orientation = 0.0
group_id = 0

[galaxy.secondary]
n_particles = 512
mass = 1.0
radius = 1.0
position = [0.8, 0.0]
velocity = [-0.15, 0.0]
orientation = 3.141592653589793
group_id = 1

[output]
directory = "experiments/validation/smoke_test"
format = "csv"
