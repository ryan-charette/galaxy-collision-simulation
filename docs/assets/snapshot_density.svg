    <radialGradient id="blue-core" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.18" stop-color="#7dd3fc"/>
      <stop offset="0.46" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amber-core" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.2" stop-color="#facc15"/>
      <stop offset="0.48" stop-color="#f97316"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tail" cx="50%" cy="50%" r="60%">
