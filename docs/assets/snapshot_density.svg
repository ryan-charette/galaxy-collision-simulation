<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="title desc">
  <title id="title">Density projection snapshot</title>
  <desc id="desc">Representative density projection of a galaxy collision snapshot with two bright cores and diffuse tidal debris.</desc>
