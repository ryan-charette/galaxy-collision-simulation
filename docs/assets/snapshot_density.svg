  <ellipse cx="376" cy="202" rx="226" ry="24" fill="#93c5fd" opacity="0.13" transform="rotate(-28 376 202)"/>
  <ellipse cx="441" cy="249" rx="232" ry="22" fill="#fdba74" opacity="0.15" transform="rotate(18 441 249)"/>
  <ellipse cx="253" cy="219" rx="88" ry="66" fill="url(#blue-core)" opacity="0.96"/>
  <ellipse cx="445" cy="237" rx="92" ry="67" fill="url(#amber-core)" opacity="0.94"/>
